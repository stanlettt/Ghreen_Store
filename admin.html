<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghreen_Store — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #c2185b;
  --rose-vif: #e91e8c;
  --rose-pale: rgba(194,24,91,0.07);
  --rose-fonce: #880e4f;
  --fond: #fdf8f5;
  --fond-2: #fff5f7;
  --texte: #2a1a20;
  --texte-doux: #7a4a5a;
  --gris: #9e6b7a;
  --vert: #27ae60;
  --rouge: #e53935;
  --blanc: #ffffff;
  --font-titre: 'Cormorant Garamond', serif;
  --font-corps: 'Montserrat', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --ombre: 0 8px 40px rgba(194,24,91,0.18);
  --ombre-douce: 0 4px 20px rgba(194,24,91,0.10);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-corps);
  background: var(--fond);
  color: var(--texte);
  font-size: 14px;
  min-height: 100vh;
}

/* ── ÉCRAN DE CONNEXION ── */
#ecranConnexion {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #fdf8f5 0%, #fff5f7 100%);
}
.login-boite {
  background: #fff;
  border: 1px solid rgba(194,24,91,0.2);
  border-radius: var(--radius);
  padding: 3rem 2.5rem;
  max-width: 400px; width: 90%;
  box-shadow: var(--ombre);
  text-align: center;
}
.login-logo {
  font-family: var(--font-titre);
  font-size: 2.5rem; font-weight: 300;
  color: var(--rose); letter-spacing: 0.2em;
  margin-bottom: 0.3rem;
}
.login-logo span { color: var(--texte); }
.login-sous { font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--texte-doux); margin-bottom: 2.5rem; }
.login-boite input[type="password"] {
  width: 100%; padding: 0.9rem 1.2rem;
  border: 1.5px solid rgba(194,24,91,0.25);
  border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.95rem;
  color: var(--texte); background: var(--fond-2);
  outline: none; transition: var(--transition);
  text-align: center; letter-spacing: 0.15em;
  margin-bottom: 1rem;
}
.login-boite input[type="password"]:focus { border-color: var(--rose); background: #fce4ec; }
.login-erreur { color: var(--rouge); font-size: 0.78rem; margin-bottom: 0.8rem; display: none; }
.login-erreur.visible { display: block; }

/* ── HEADER ADMIN ── */
#adminApp { display: none; }
.admin-header {
  background: linear-gradient(135deg, var(--rose) 0%, var(--rose-vif) 100%);
  color: #fff; padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(194,24,91,0.3);
}
.admin-header-logo {
  font-family: var(--font-titre);
  font-size: 1.6rem; font-weight: 300;
  letter-spacing: 0.2em;
}
.admin-header-logo span { opacity: 0.7; }
.admin-header-right { display: flex; align-items: center; gap: 1rem; }
.admin-badge {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  background: rgba(255,255,255,0.2); padding: 0.3rem 0.8rem;
  border-radius: 50px;
}
.btn-deconnexion {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
  color: #fff; padding: 0.4rem 1rem; border-radius: var(--radius-sm);
  font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; font-family: var(--font-corps);
  transition: var(--transition);
}
.btn-deconnexion:hover { background: rgba(255,255,255,0.3); }

/* ── LAYOUT PRINCIPAL ── */
.admin-main { max-width: 1300px; margin: 0 auto; padding: 2rem; }

/* ── STATS ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem; margin-bottom: 2rem;
}
.stat-carte {
  background: #fff; border: 1px solid rgba(194,24,91,0.12);
  border-radius: var(--radius); padding: 1.4rem;
  display: flex; align-items: center; gap: 1rem;
  box-shadow: var(--ombre-douce);
}
.stat-icone { font-size: 2rem; }
.stat-val { font-family: var(--font-titre); font-size: 2rem; font-weight: 300; color: var(--rose); line-height: 1; }
.stat-lib { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gris); margin-top: 0.2rem; }

/* ── TABS ── */
.tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 2px solid rgba(194,24,91,0.15); }
.tab {
  padding: 0.8rem 1.5rem; font-size: 0.75rem; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; border: none; background: none;
  color: var(--texte-doux); font-family: var(--font-corps);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: var(--transition);
}
.tab:hover { color: var(--rose); }
.tab.actif { color: var(--rose); border-bottom-color: var(--rose); font-weight: 600; }

/* ── SECTION CONTENU ── */
.tab-content { display: none; }
.tab-content.actif { display: block; }

/* ── FORMULAIRE AJOUT / MODIF ── */
.section-titre-admin {
  font-family: var(--font-titre); font-size: 1.8rem; font-weight: 300;
  color: var(--texte); margin-bottom: 1.5rem;
}
.section-titre-admin span { color: var(--rose); font-style: italic; }
.form-admin {
  background: #fff; border: 1px solid rgba(194,24,91,0.12);
  border-radius: var(--radius); padding: 2rem;
  box-shadow: var(--ombre-douce); margin-bottom: 2rem;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .form-grid, .form-grid-3 { grid-template-columns: 1fr; } }
.fg { display: flex; flex-direction: column; gap: 0.4rem; }
.fg label {
  font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--rose-fonce); font-weight: 500;
}
.fg input, .fg select, .fg textarea {
  background: var(--fond-2); border: 1.5px solid rgba(194,24,91,0.2);
  color: var(--texte); padding: 0.7rem 1rem;
  font-family: var(--font-corps); font-size: 0.88rem;
  border-radius: var(--radius-sm); outline: none; transition: var(--transition);
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color: var(--rose); background: #fce4ec;
}
.fg textarea { resize: vertical; min-height: 70px; }
.fg-full { grid-column: 1 / -1; }
.form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }

/* ── BOUTONS ── */
.btn-rose {
  background: var(--rose); color: #fff; border: none;
  padding: 0.75rem 2rem; border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.78rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: var(--transition); font-weight: 500;
}
.btn-rose:hover { background: var(--rose-vif); transform: translateY(-1px); box-shadow: var(--ombre-douce); }
.btn-outline-admin {
  background: none; color: var(--rose); border: 1.5px solid var(--rose);
  padding: 0.75rem 2rem; border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.78rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: var(--transition);
}
.btn-outline-admin:hover { background: var(--rose-pale); }
.btn-danger {
  background: none; color: var(--rouge); border: 1.5px solid var(--rouge);
  padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
  font-size: 0.72rem; letter-spacing: 0.1em; cursor: pointer;
  font-family: var(--font-corps); transition: var(--transition);
}
.btn-danger:hover { background: var(--rouge); color: #fff; }
.btn-edit {
  background: none; color: var(--rose); border: 1.5px solid var(--rose);
  padding: 0.4rem 0.9rem; border-radius: var(--radius-sm);
  font-size: 0.72rem; letter-spacing: 0.1em; cursor: pointer;
  font-family: var(--font-corps); transition: var(--transition);
}
.btn-edit:hover { background: var(--rose); color: #fff; }
.btn-vert {
  background: var(--vert); color: #fff; border: none;
  padding: 0.75rem 2rem; border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.78rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: var(--transition);
}
.btn-vert:hover { opacity: 0.9; }

/* ── TABLE PRODUITS ── */
.table-wrap { background: #fff; border: 1px solid rgba(194,24,91,0.12); border-radius: var(--radius); overflow: hidden; box-shadow: var(--ombre-douce); }
.table-top { padding: 1.2rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid rgba(194,24,91,0.1); }
.table-recherche {
  border: 1.5px solid rgba(194,24,91,0.2); border-radius: var(--radius-sm);
  padding: 0.5rem 1rem; font-family: var(--font-corps); font-size: 0.85rem;
  color: var(--texte); background: var(--fond-2); outline: none;
  width: 240px;
}
.table-recherche:focus { border-color: var(--rose); }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--fond-2); text-align: left;
  padding: 0.8rem 1rem; font-size: 0.68rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--rose-fonce); font-weight: 600;
  border-bottom: 1px solid rgba(194,24,91,0.1);
}
td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(194,24,91,0.06); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--fond-2); }
.td-photo { width: 60px; }
.td-photo img { width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid rgba(194,24,91,0.15); }
.td-photo .no-photo { width: 50px; height: 50px; background: var(--fond-2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
.td-nom { font-family: var(--font-titre); font-size: 1rem; font-weight: 300; }
.td-cat { display: inline-block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; background: var(--rose-pale); color: var(--rose); padding: 0.15rem 0.6rem; border-radius: 50px; }
.td-prix { font-weight: 600; color: var(--rose); white-space: nowrap; }
.td-badge { display: inline-block; font-size: 0.62rem; letter-spacing: 0.1em; background: var(--rose); color: #fff; padding: 0.15rem 0.5rem; border-radius: 50px; }
.td-actions { display: flex; gap: 0.4rem; white-space: nowrap; }
.badge-visible { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--vert); }
.badge-invisible { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ccc; }

/* ── SECTION SHEETS ── */
.sheets-setup {
  background: #fff; border: 1px solid rgba(194,24,91,0.12);
  border-radius: var(--radius); padding: 2rem;
  box-shadow: var(--ombre-douce); margin-bottom: 2rem;
}
.sheets-etapes { display: flex; flex-direction: column; gap: 1.5rem; margin: 1.5rem 0; }
.sheets-etape { display: flex; gap: 1rem; align-items: flex-start; }
.etape-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--rose); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 600; flex-shrink: 0;
}
.etape-txt { font-size: 0.88rem; color: var(--texte-doux); line-height: 1.6; }
.etape-txt strong { color: var(--texte); }
.etape-txt code {
  background: var(--fond-2); padding: 0.15rem 0.5rem;
  border-radius: 4px; font-size: 0.82rem; color: var(--rose-fonce);
  font-family: monospace;
}
.url-input-wrap { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
.url-input-wrap input {
  flex: 1; min-width: 200px; padding: 0.7rem 1rem;
  border: 1.5px solid rgba(194,24,91,0.25); border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.85rem; outline: none;
  background: var(--fond-2); color: var(--texte);
}
.url-input-wrap input:focus { border-color: var(--rose); }

/* ── TOAST ── */
#adminToast {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
  background: var(--texte); color: #fff;
  padding: 0.8rem 1.5rem; border-radius: var(--radius-sm);
  font-size: 0.82rem; letter-spacing: 0.05em;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s ease; pointer-events: none;
  max-width: 320px;
}
#adminToast.visible { transform: translateY(0); opacity: 1; }
#adminToast.succes { background: var(--vert); }
#adminToast.erreur { background: var(--rouge); }

/* ── MODAL CONFIRM ── */
.modal-confirm {
  display: none; position: fixed; inset: 0; z-index: 8000;
  background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
}
.modal-confirm.actif { display: flex; }
.modal-confirm-boite {
  background: #fff; border-radius: var(--radius); padding: 2rem;
  max-width: 380px; width: 90%; text-align: center;
  box-shadow: var(--ombre);
}
.modal-confirm-boite h3 { font-family: var(--font-titre); font-size: 1.4rem; font-weight: 300; color: var(--rouge); margin-bottom: 1rem; }
.modal-confirm-boite p { font-size: 0.88rem; color: var(--texte-doux); margin-bottom: 1.5rem; }
.modal-confirm-actions { display: flex; gap: 1rem; justify-content: center; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .admin-main { padding: 1rem; }
  .form-grid { grid-template-columns: 1fr; }
  table { font-size: 0.82rem; }
  th, td { padding: 0.5rem 0.6rem; }
  .td-photo, .td-actions { min-width: auto; }
}


/* ── GRILLE ADMIN ── */
#grille-admin {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
  padding: 1.5rem;
}
.produit-admin-carte {
  background: #fff;
  border: 1px solid rgba(194,24,91,0.12);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--ombre-douce);
  transition: var(--transition);
  display: flex;
  flex-direction: column;
}
.produit-admin-carte:hover { transform: translateY(-3px); box-shadow: var(--ombre); }
.produit-admin-img-wrap {
  position: relative; aspect-ratio: 1/1; overflow: hidden; background: var(--fond-2);
}
.produit-admin-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block; transition: var(--transition);
}
.produit-admin-carte:hover .produit-admin-img-wrap img { transform: scale(1.05); }
.badge-admin {
  position: absolute; top: 0.5rem; left: 0.5rem;
  background: var(--rose); color: #fff;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 0.25rem 0.6rem; border-radius: 50px;
}
.produit-admin-info { padding: 0.8rem 1rem 0.5rem; flex: 1; }
.produit-admin-nom { font-family: var(--font-titre); font-size: 1.05rem; font-weight: 600; color: var(--texte); }
.produit-admin-cat { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gris); margin-top: 0.2rem; }
.produit-admin-prix { font-size: 0.9rem; font-weight: 600; color: var(--rose); margin-top: 0.4rem; }
.produit-admin-actions { display: flex; gap: 0.5rem; padding: 0.8rem 1rem; background: var(--fond-2); }
.btn-modifier {
  flex: 1; padding: 0.6rem; background: var(--rose); color: #fff;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-corps); font-size: 0.75rem; font-weight: 500;
  transition: var(--transition);
}
.btn-modifier:hover { background: var(--rose-fonce); }
.btn-supprimer {
  flex: 1; padding: 0.6rem; background: transparent; color: var(--rouge);
  border: 1.5px solid var(--rouge); border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-corps); font-size: 0.75rem; font-weight: 500;
  transition: var(--transition);
}
.btn-supprimer:hover { background: var(--rouge); color: #fff; }

/* ── MODAL ÉDITION ── */
#modal-edition {
  display: none; position: fixed; inset: 0; z-index: 9000;
  align-items: center; justify-content: center;
  background: rgba(42,26,32,0.5); backdrop-filter: blur(4px);
}
.modal-boite {
  background: #fff; border-radius: var(--radius); padding: 2rem;
  width: 90%; max-width: 540px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--ombre);
}
.modal-titre {
  font-family: var(--font-titre); font-size: 1.6rem; font-weight: 300;
  color: var(--rose); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;
}
.modal-badge-id {
  font-size: 0.72rem; background: var(--rose-pale); color: var(--rose-fonce);
  padding: 0.2rem 0.6rem; border-radius: 50px; font-family: var(--font-corps);
}
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.modal-grid .fg-full { grid-column: 1 / -1; }
.fg label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--rose-fonce); font-weight: 500; margin-bottom: 0.4rem; }
.fg input, .fg select, .fg textarea {
  width: 100%; padding: 0.7rem 0.9rem;
  border: 1.5px solid rgba(194,24,91,0.2); border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.88rem; color: var(--texte);
  background: var(--fond-2); outline: none; transition: var(--transition);
}
.fg input:focus, .fg select:focus { border-color: var(--rose); background: #fce4ec; }
.modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }

/* ── STATS ── */
#stats-admin { display: flex; gap: 1rem; padding: 1.5rem; flex-wrap: wrap; }
.stat-carte { background: #fff; border: 1px solid rgba(194,24,91,0.1); border-radius: var(--radius); padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 140px; box-shadow: var(--ombre-douce); }
.stat-icone { font-size: 1.8rem; }
.stat-val { font-size: 1.6rem; font-weight: 700; color: var(--rose); font-family: var(--font-titre); }
.stat-lib { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--texte-doux); }

/* ── TOOLBAR ── */
.toolbar-admin { display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem 1rem; flex-wrap: wrap; }
.toolbar-admin input {
  flex: 1; min-width: 200px; padding: 0.7rem 1rem;
  border: 1.5px solid rgba(194,24,91,0.2); border-radius: var(--radius-sm);
  font-family: var(--font-corps); font-size: 0.88rem; color: var(--texte); background: var(--fond-2); outline: none;
}
.toolbar-admin input:focus { border-color: var(--rose); }

@media (max-width: 600px) {
  #grille-admin { grid-template-columns: 1fr 1fr; gap: 0.8rem; padding: 1rem; }
  .modal-grid { grid-template-columns: 1fr; }
  #stats-admin { gap: 0.6rem; }
  .stat-carte { padding: 0.8rem 1rem; min-width: 100px; }
}

</style>
</head>
<body>

<!-- ── ÉCRAN CONNEXION ── -->
<div id="ecranConnexion">
  <div class="login-boite">
    <div class="login-logo">Ghreen<span>_</span>Store</div>
    <div class="login-sous">Administration</div>
    <input type="password" id="champMdp" placeholder="Mot de passe" autocomplete="current-password" />
    <div class="login-erreur" id="erreurMdp"></div>
    <button class="btn-connexion btn-rose" style="width:100%;padding:0.9rem;font-size:0.85rem;letter-spacing:0.1em;" onclick="seConnecter()">Se connecter</button>
  </div>
</div>

<!-- ── APP ADMIN ── -->
<div id="adminApp" style="display:none;">
  <div class="admin-header">
    <div class="admin-header-logo">Ghreen<span>_Store</span></div>
    <div class="admin-header-right">
      <span class="admin-badge">Admin</span>
      <button class="btn-deconnexion" onclick="seDeconnecter()">Déconnexion</button>
    </div>
  </div>

  <div class="admin-main">
    <!-- Stats -->
    <div id="stats-admin"></div>

    <!-- Toolbar -->
    <div class="toolbar-admin">
      <input type="text" id="recherche-admin" placeholder="🔍 Rechercher un produit..." oninput="rendreProduits()" />
      <button class="btn-rose" onclick="ouvrirAjout()" style="white-space:nowrap;padding:0.7rem 1.4rem;font-size:0.82rem;">➕ Ajouter un produit</button>
    </div>

    <!-- Grille produits -->
    <div id="grille-admin"></div>
  </div>
</div>

<!-- ── MODAL ÉDITION ── -->
<div id="modal-edition">
  <div class="modal-boite">
    <div class="modal-titre">
      ✏️ Produit
      <span class="modal-badge-id" id="edit-id"></span>
    </div>

/* ═══════════════════════════════════════════════════
   JSONBIN
════════════════════════════════════════════════════ */
async function jsonBinGet() {
  const rep = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID + '/latest', {
    headers: { 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Meta': 'false' }
  });
  if (!rep.ok) throw new Error('Erreur JSONBin: ' + rep.status);
  const data = await rep.json();
  return Array.isArray(data) ? data : [];
}

async function jsonBinSet(donnees) {
  const rep = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify(donnees)
  });
  if (!rep.ok) throw new Error('Erreur sauvegarde: ' + rep.status);
  return true;
}

/* ═══════════════════════════════════════════════════
   NOTIFICATION
════════════════════════════════════════════════════ */
function notif(msg, type) {
  type = type || 'succes';
  let n = document.getElementById('notif-admin');
  if (!n) {
    n = document.createElement('div');
    n.id = 'notif-admin';
    n.style.cssText = 'position:fixed;top:1.5rem;right:1.5rem;z-index:9999;padding:1rem 1.5rem;border-radius:12px;font-family:Montserrat,sans-serif;font-size:0.85rem;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,0.15);transition:opacity 0.3s;max-width:320px;';
    document.body.appendChild(n);
  }
  n.style.background = type === 'succes' ? '#27ae60' : '#e53935';
  n.style.color = '#fff';
  n.textContent = msg;
  n.style.display = 'block';
  n.style.opacity = '1';
  setTimeout(function(){ n.style.opacity = '0'; setTimeout(function(){ n.style.display = 'none'; }, 300); }, 3500);
}

/* ═══════════════════════════════════════════════════
   CONNEXION
════════════════════════════════════════════════════ */
function seConnecter() {
  const mdp = document.getElementById('champMdp').value;
  if (mdp === MOT_DE_PASSE) {
    document.getElementById('ecranConnexion').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    chargerDonnees();
  } else {
    const err = document.getElementById('erreurMdp');
    if (err) { err.textContent = 'Mot de passe incorrect'; err.classList.add('visible'); }
  }
}

function seDeconnecter() {
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('ecranConnexion').style.display = 'flex';
  document.getElementById('champMdp').value = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'champMdp') seConnecter();
});

/* ═══════════════════════════════════════════════════
   CHARGEMENT
════════════════════════════════════════════════════ */
async function chargerDonnees() {
  const grille = document.getElementById('grille-admin');
  if (grille) grille.innerHTML = '<div style="text-align:center;padding:3rem;color:#c2185b;font-family:Montserrat,sans-serif;">Chargement depuis JSONBin...</div>';
  try {
    const data = await jsonBinGet();
    if (data.length > 0) {
      produits = data;
      notif('Produits chargés depuis JSONBin (' + produits.length + ' produits)');
    } else {
      produits = PRODUITS_INITIAUX.slice();
      await jsonBinSet(produits);
      notif('Produits initialisés sur JSONBin !');
    }
  } catch(e) {
    produits = PRODUITS_INITIAUX.slice();
    notif('JSONBin inaccessible, produits locaux', 'erreur');
  }
  mettreAJourStats();
  rendreProduits();
}

async function sauvegarderEnLigne() {
  try {
    await jsonBinSet(produits);
    return true;
  } catch(e) {
    notif('Erreur de sauvegarde: ' + e.message, 'erreur');
    return false;
  }
}

/* ═══════════════════════════════════════════════════
   STATS
════════════════════════════════════════════════════ */
function mettreAJourStats() {
  const cats = [];
  produits.forEach(function(p){ if (cats.indexOf(p.cat) === -1) cats.push(p.cat); });
  const prixMoy = produits.length ? Math.round(produits.reduce(function(s,p){ return s+p.prix; }, 0) / produits.length) : 0;
  const el = document.getElementById('stats-admin');
  if (!el) return;
  el.innerHTML =
    '<div class="stat-carte"><div class="stat-icone">📦</div><div><div class="stat-val">' + produits.length + '</div><div class="stat-lib">Produits</div></div></div>' +
    '<div class="stat-carte"><div class="stat-icone">🗂️</div><div><div class="stat-val">' + cats.length + '</div><div class="stat-lib">Catégories</div></div></div>' +
    '<div class="stat-carte"><div class="stat-icone">💰</div><div><div class="stat-val">' + prixMoy.toLocaleString('fr-FR') + '</div><div class="stat-lib">Prix moy. FCFA</div></div></div>' +
    '<div class="stat-carte"><div class="stat-icone">⭐</div><div><div class="stat-val">' + produits.filter(function(p){ return p.badge; }).length + '</div><div class="stat-lib">Avec badge</div></div></div>';
}

/* ═══════════════════════════════════════════════════
   AFFICHAGE
════════════════════════════════════════════════════ */
function rendreProduits() {
  const grille = document.getElementById('grille-admin');
  if (!grille) return;
  const terme = (document.getElementById('recherche-admin') ? document.getElementById('recherche-admin').value : '').toLowerCase();
  const liste = produits.filter(function(p){
    return !terme || p.nom.toLowerCase().indexOf(terme) !== -1 || p.cat.toLowerCase().indexOf(terme) !== -1 || String(p.id).indexOf(terme) !== -1;
  });
  if (!liste.length) {
    grille.innerHTML = '<div style="text-align:center;padding:3rem;color:#9e6b7a;font-family:Montserrat,sans-serif;">Aucun produit trouvé</div>';
    return;
  }
  grille.innerHTML = liste.map(function(p){
    const photo = Array.isArray(p.photos) ? p.photos[0] : p.photos;
    const etoiles = '⭐'.repeat(p.note) + '☆'.repeat(5-p.note);
    return '<div class="produit-admin-carte">' +
      '<div class="produit-admin-img-wrap">' +
      '<img src="' + photo + '" alt="' + p.nom + '" loading="lazy" onerror="this.style.opacity=\'0.2\'">' +
      (p.badge ? '<span class="badge-admin">' + p.badge + '</span>' : '') +
      '</div>' +
      '<div class="produit-admin-info">' +
      '<div class="produit-admin-nom">' + p.icone + ' ' + p.nom + '</div>' +
      '<div class="produit-admin-cat">' + p.cat + '</div>' +
      '<div class="produit-admin-prix">' + p.prix.toLocaleString('fr-FR') + ' FCFA</div>' +
      '<div style="font-size:0.7rem;color:#9e6b7a;margin-top:0.3rem;">' + etoiles + '</div>' +
      '</div>' +
      '<div class="produit-admin-actions">' +
      '<button class="btn-modifier" onclick="ouvrirEdition(' + p.id + ')">✏️ Modifier</button>' +
      '<button class="btn-supprimer" onclick="supprimerProduit(' + p.id + ')">🗑️</button>' +
      '</div></div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════
   ÉDITION
════════════════════════════════════════════════════ */
function ouvrirEdition(id) {
  const p = produits.find(function(x){ return x.id === id; });
  if (!p) return;
  editId = id;
  document.getElementById('edit-id').textContent = '#' + id;
  document.getElementById('edit-nom').value = p.nom;
  document.getElementById('edit-cat').value = p.cat;
  document.getElementById('edit-prix').value = p.prix;
  document.getElementById('edit-badge').value = p.badge || '';
  document.getElementById('edit-note').value = p.note;
  document.getElementById('edit-icone').value = p.icone;
  document.getElementById('edit-photos').value = Array.isArray(p.photos) ? p.photos.join(', ') : (p.photos || '');
  document.getElementById('modal-edition').style.display = 'flex';
}

function ouvrirAjout() {
  editId = null;
  document.getElementById('edit-id').textContent = 'Nouveau';
  document.getElementById('edit-nom').value = '';
  document.getElementById('edit-cat').value = 'sacs';
  document.getElementById('edit-prix').value = '';
  document.getElementById('edit-badge').value = '';
  document.getElementById('edit-note').value = '5';
  document.getElementById('edit-icone').value = '🛍️';
  document.getElementById('edit-photos').value = '';
  document.getElementById('modal-edition').style.display = 'flex';
}

function fermerModal() {
  document.getElementById('modal-edition').style.display = 'none';
  editId = null;
}

async function sauvegarderProduit() {
  const nom   = document.getElementById('edit-nom').value.trim();
  const cat   = document.getElementById('edit-cat').value;
  const prix  = parseInt(document.getElementById('edit-prix').value);
  const badge = document.getElementById('edit-badge').value.trim();
  const note  = parseInt(document.getElementById('edit-note').value);
  const icone = document.getElementById('edit-icone').value.trim() || '🛍️';
  const photosRaw = document.getElementById('edit-photos').value.trim();
  const photos = photosRaw.indexOf(',') !== -1 ? photosRaw.split(',').map(function(s){ return s.trim(); }).filter(Boolean) : photosRaw;

  if (!nom || !cat || isNaN(prix)) {
    notif('Nom, catégorie et prix sont obligatoires', 'erreur');
    return;
  }

  const btns = document.querySelectorAll('#modal-edition button');
  btns.forEach(function(b){ b.disabled = true; });

  if (editId !== null) {
    const idx = produits.findIndex(function(p){ return p.id === editId; });
    if (idx !== -1) produits[idx] = { id: editId, nom: nom, cat: cat, prix: prix, badge: badge, note: note, icone: icone, photos: photos };
  } else {
    const maxId = produits.length ? Math.max.apply(null, produits.map(function(p){ return p.id; })) : 0;
    produits.push({ id: maxId + 1, nom: nom, cat: cat, prix: prix, badge: badge, note: note, icone: icone, photos: photos });
  }

  const ok = await sauvegarderEnLigne();
  if (ok) {
    notif(editId !== null ? 'Produit modifié sur le site !' : 'Nouveau produit ajouté sur le site !');
    fermerModal();
    mettreAJourStats();
    rendreProduits();
  }

  btns.forEach(function(b){ b.disabled = false; });
}

async function supprimerProduit(id) {
  const p = produits.find(function(x){ return x.id === id; });
  if (!p) return;
  if (!confirm('Supprimer "' + p.nom + '" ?\n\nCe produit disparaîtra du site immédiatement.')) return;
  const anciensProduits = produits.slice();
  produits = produits.filter(function(x){ return x.id !== id; });
  const ok = await sauvegarderEnLigne();
  if (ok) {
    notif('Produit supprimé du site !');
    mettreAJourStats();
    rendreProduits();
  } else {
    produits = anciensProduits;
    rendreProduits();
  }
}

document.addEventListener('click', function(e) {
  const modal = document.getElementById('modal-edition');
  if (modal && e.target === modal) fermerModal();
});
</script>
</body>
